const STORAGE_KEY = "surf_tracker_v4";
const SESSION_ORDER = ["A","B","C"];
const EMPTY_DATA = { overrides:{}, history:[], log:[], initialized:false };

function loadData() {
  try { const r = localStorage.getItem(STORAGE_KEY); return r ? JSON.parse(r) : EMPTY_DATA; }
  catch { return EMPTY_DATA; }
}
function saveData(d) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); } catch {} }

function exportData(d) {
  const json = JSON.stringify(d, null, 2);
  const blob = new Blob([json], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `surf-training-backup-${new Date().toISOString().split("T")[0]}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importData(file, onSuccess, onError) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const parsed = JSON.parse(e.target.result);
      if (!parsed.log || !parsed.overrides) throw new Error("Format invalide");
      onSuccess({...parsed, initialized: true});
    } catch { onError(); }
  };
  reader.readAsText(file);
}

function localDateStr(d) {
  const dt = d || new Date();
  const y = dt.getFullYear();
  const m = String(dt.getMonth()+1).padStart(2,"0");
  const day = String(dt.getDate()).padStart(2,"0");
  return y+"-"+m+"-"+day;
}
function todayStr() { return localDateStr(); }
function daysDiff(a, b) { return Math.round((new Date(b+"T12:00:00") - new Date(a+"T12:00:00")) / 86400000); }

function computeStatus(log) {
  const today = todayStr();
  const yesterday = localDateStr(new Date(Date.now()-86400000));
  const todayEntry = log.find(e=>e.date===today);
  const yestEntry  = log.find(e=>e.date===yesterday);
  if (todayEntry) return { status:"done", todayType:todayEntry.type, session:todayEntry.session };
  if (yestEntry?.type==="surf") return { status:"rest", reason:"Tu as surfé hier — repos J+1" };
  if (yestEntry?.type==="gym")  return { status:"ready" };
  const lastEntry = [...log].sort((a,b)=>b.date.localeCompare(a.date))[0];
  if (!lastEntry) return { status:"ready" };
  const daysSince = daysDiff(lastEntry.date, today);
  if (daysSince >= 3) return { status:"warning", reason:`${daysSince} jours sans activité` };
  return { status:"ready" };
}

function hasNoSurfThisWeek(log) {
  return getWeekLog(log).filter(e=>e.type==="surf").length === 0;
}

function nextSession(log) {
  const gymLogs = log.filter(e=>e.type==="gym").sort((a,b)=>b.date.localeCompare(a.date));
  if (!gymLogs.length) return "A";
  const last = gymLogs[0].session === "X" ? gymLogs[1]?.session : gymLogs[0].session;
  if (!last) return "A";
  return SESSION_ORDER[(SESSION_ORDER.indexOf(last)+1)%3];
}

function getWeekLog(log) {
  const now = new Date(); const monday = new Date(now);
  monday.setDate(now.getDate()-((now.getDay()+6)%7)); monday.setHours(0,0,0,0);
  return log.filter(e=>new Date(e.date+"T12:00:00")>=monday);
}

          current={data.overrides[exs[editIdx].id] || {sets:exs[editIdx].sets,reps:exs[editIdx].reps,load:exs[editIdx].load,rest:exs[editIdx].rest}}
          color={color} onSave={v=>handleSave(exs[editIdx].id,v)} onClose={()=>setEditIdx(null)}/>
      )}
    </div>
  );
}

// ─── SESSION VIEW ─────────────────────────────────────────────────────────────
function SessionView({sessionKey, data, onUpdate, onBack}){
  const isBonus = sessionKey === "BONUS";
  const s = isBonus ? BONUS : PROGRAM[sessionKey];
  const exs = s.exercises, color = s.color;
  const [step, setStep] = useState(0);
  const [tour, setTour] = useState(1);
  const [liveNotes, setLiveNotes] = useState({});

  const totalSteps = exs.length;
  const inSurf = !isBonus && step === totalSteps;
  const curEx = !inSurf ? exs[step] : null;
  const curData = curEx ? (data.overrides[curEx.id] || {sets:curEx.sets,reps:curEx.reps,load:curEx.load,rest:curEx.rest}) : null;
  const isLastOfLastTour = isBonus && step === totalSteps-1 && tour === 4;

  const goNext = () => {
    if (isBonus && step+1 === totalSteps && tour < 4) {
      setStep(0); setTour(t=>t+1);
    } else {
      setStep(s=>s+1);
    }
  };

  const completeSession = () => {
    const sessionId = isBonus ? "X" : sessionKey;
    const entry = {
      date: todayStr(), type:"gym", session:sessionId, label:s.label,
      exercises: exs.map(ex => ({
        name: ex.name,
        ...(data.overrides[ex.id] || {sets:ex.sets, reps:ex.reps, load:ex.load}),
        ...(liveNotes[ex.id] ? {sessionNote: liveNotes[ex.id]} : {})
      }))
    };
    const newLog = [...(data.log||[]).filter(e=>e.date!==todayStr()), {date:todayStr(),type:"gym",session:sessionId}];
    onUpdate({...data, history:[entry,...(data.history||[])].slice(0,30), log:newLog});
    onBack();
  };

  return(
    <div style={{minHeight:"100vh",background:"#0a0f1e",color:"#fff",fontFamily:"'Outfit',sans-serif"}}>
      <div style={{padding:"16px 20px 0",display:"flex",alignItems:"center",gap:12}}>
        <button onClick={onBack} style={{background:"none",border:"none",color:"rgba(255,255,255,0.45)",cursor:"pointer",padding:4}}><Ic.back/></button>
        <div>
          <div style={{fontSize:11,color,fontWeight:700,letterSpacing:2}}>{s.label}</div>
          <div style={{fontSize:14,color:"rgba(255,255,255,0.5)"}}>{s.subtitle}</div>
        </div>
        <div style={{marginLeft:"auto",fontSize:13,color:"rgba(255,255,255,0.35)"}}>
          {inSurf?"🌊 Surf":isBonus?`Tour ${tour}/4 · ${step+1}/${totalSteps}`:`${step+1}/${totalSteps}`}
        </div>
      </div>

      <div style={{margin:"12px 20px 0",height:3,background:"rgba(255,255,255,0.07)",borderRadius:2}}>
        <div style={{height:"100%",borderRadius:2,background:color,
          width:`${isBonus?(((tour-1)*totalSteps+step)/(4*totalSteps))*100:inSurf?96:(step/totalSteps)*90}%`,
          transition:"width 0.4s"}}/>
      </div>

      {isBonus&&(
        <div style={{display:"flex",gap:6,padding:"10px 20px 0"}}>
          {[1,2,3,4].map(t=>(
            <div key={t} style={{flex:1,height:4,borderRadius:2,
              background:t<tour?"#a855f7":t===tour?"rgba(168,85,247,0.5)":"rgba(255,255,255,0.08)"}}/>
          ))}
        </div>
      )}

      <div style={{padding:"20px 20px 100px"}}>
        {isBonus&&(
          <div style={{background:"rgba(168,85,247,0.1)",border:"1px solid rgba(168,85,247,0.25)",borderRadius:12,padding:"10px 14px",marginBottom:16,fontSize:13,color:"rgba(168,85,247,0.9)"}}>
            ⚡ {s.note}
          </div>
        )}

        {curEx && (
          <div>
            <div style={{background:"rgba(255,255,255,0.04)",borderRadius:16,padding:"20px",border:`1px solid ${color}30`,marginBottom:16}}>
              <div style={{fontSize:21,fontWeight:700,lineHeight:1.3,marginBottom:16}}>{curEx.name}</div>

              {/* 4 stats: séries / reps / charge / repos inter-séries */}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:8,marginBottom:14}}>
                {[
                  ["Séries", curData.sets],
                  ["Reps", curData.reps],
                  ["Charge", curData.load],
                  ["Repos/série", (curData.rest ?? curEx.rest) + '"']
                ].map(([label,val])=>(
                  <div key={label} style={{background:"rgba(255,255,255,0.07)",borderRadius:10,padding:"10px 4px",textAlign:"center"}}>
                    <div style={{fontSize:15,fontWeight:700,color,lineHeight:1.2}}>{val}</div>
                    <div style={{fontSize:9,color:"rgba(255,255,255,0.38)",marginTop:3}}>{label}</div>
                  </div>
                ))}
              </div>

              <div style={{fontSize:13,color:"rgba(255,255,255,0.4)",fontStyle:"italic",background:"rgba(255,255,255,0.04)",padding:"8px 12px",borderRadius:8,marginBottom:12}}>
                💡 {curEx.notes}
              </div>

              {/* Note de séance en live */}
              <div>
                <div style={{fontSize:11,color:"rgba(255,255,255,0.3)",letterSpacing:1,marginBottom:6}}>NOTE DE SÉANCE</div>
                <textarea
                  value={liveNotes[curEx.id]||""}
                  onChange={e=>setLiveNotes(n=>({...n,[curEx.id]:e.target.value}))}
                  rows={2}
                  placeholder="Douleur, ressenti, charge utilisée, variante..."
                  style={{width:"100%",background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",
                    borderRadius:10,padding:"10px 14px",color:"#fff",fontSize:13,fontFamily:"inherit",
                    resize:"none",boxSizing:"border-box",outline:"none"}}
                />
              </div>
            </div>

            <button onClick={isLastOfLastTour ? completeSession : goNext}
              style={{width:"100%",padding:"16px",background:color,border:"none",borderRadius:14,
                color:"#fff",fontSize:16,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
              <Ic.check/> {isLastOfLastTour ? "Terminer le circuit ✓" : "Exercice terminé →"}
            </button>
          </div>
        )}

        {inSurf && !isBonus && (
          <div>
            <div style={{fontSize:22,fontWeight:800,color:"#22d3ee",marginBottom:6}}>🌊 Bloc surf</div>
            <div style={{fontSize:14,color:"rgba(255,255,255,0.4)",marginBottom:20}}>Protection coiffe des rotateurs</div>
            {s.surf.map((x,i)=>(
              <div key={i} style={{background:"rgba(34,211,238,0.07)",border:"1px solid rgba(34,211,238,0.2)",borderRadius:12,padding:"14px 16px",marginBottom:10,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div style={{fontSize:15,fontWeight:600}}>{x.name}</div>
                <div style={{fontSize:14,color:"#22d3ee",fontWeight:700}}>{x.vol}</div>
              </div>
            ))}
            <button onClick={completeSession} style={{width:"100%",marginTop:16,padding:"16px",background:"#22d3ee",border:"none",borderRadius:14,color:"#0a0f1e",fontSize:16,fontWeight:800,cursor:"pointer"}}>
              ✓ Terminer la séance
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── WEEK STRIP ───────────────────────────────────────────────────────────────
function WeekStrip({log}){
  const now=new Date(); const monday=new Date(now);
  monday.setDate(now.getDate()-((now.getDay()+6)%7)); monday.setHours(0,0,0,0);
  const days=["L","M","M","J","V","S","D"];
  const weekLog=getWeekLog(log);
  const surfCount=weekLog.filter(e=>e.type==="surf").length;
  const gymCount=weekLog.filter(e=>e.type==="gym").length;
  return(
    <div style={{background:"rgba(255,255,255,0.04)",borderRadius:16,padding:"16px",marginBottom:16,border:"1px solid rgba(255,255,255,0.07)"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <div style={{fontSize:11,color:"rgba(255,255,255,0.35)",fontWeight:700,letterSpacing:2}}>CETTE SEMAINE</div>
        <div style={{display:"flex",gap:12}}>
          <span style={{fontSize:13,color:"#22d3ee"}}>🏄 {surfCount}</span>
          <span style={{fontSize:13,color:"#a78bfa"}}>💪 {gymCount}</span>
        </div>
      </div>
      <div style={{display:"flex",gap:5}}>
        {days.map((d,i)=>{
          const day=new Date(monday); day.setDate(monday.getDate()+i);
          const ds=localDateStr(day);
          const entry=log.find(e=>e.date===ds);
          const isToday=ds===todayStr();
          let bg="rgba(255,255,255,0.04)",icon=null,borderCol="transparent";
          if(entry?.type==="surf"){bg="rgba(34,211,238,0.12)";icon="🏄";borderCol="#22d3ee";}
          if(entry?.type==="gym"){const c=PROGRAM[entry.session]?.color||"#888";bg=c+"20";icon="💪";borderCol=c;}
          if(isToday&&!entry)borderCol="rgba(255,255,255,0.25)";
          return(
            <div key={i} style={{flex:1,textAlign:"center"}}>
              <div style={{fontSize:10,marginBottom:4,color:isToday?"#fff":"rgba(255,255,255,0.25)",fontWeight:isToday?700:400}}>{d}</div>
              <div style={{borderRadius:9,padding:"7px 3px",background:bg,border:`1.5px solid ${borderCol}`,minHeight:38,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:1}}>
                {icon&&<span style={{fontSize:13}}>{icon}</span>}
                {entry?.type==="gym"&&<span style={{fontSize:9,color:PROGRAM[entry.session]?.color,fontWeight:700}}>{entry.session}</span>}
                {isToday&&!entry&&<div style={{width:4,height:4,borderRadius:"50%",background:"rgba(255,255,255,0.35)"}}/>}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── STATUS CARD ─────────────────────────────────────────────────────────────
function StatusCard({statusInfo,nextSess,onSurf,onStartGym}){
  const{status,reason,todayType,session}=statusInfo;
  const s=PROGRAM[nextSess];
  if(status==="done"){
    const isGym=todayType==="gym";
    return(
      <div style={{background:"rgba(255,255,255,0.04)",borderRadius:16,padding:"22px",border:"1px solid rgba(255,255,255,0.1)",textAlign:"center",marginBottom:16}}>
        <div style={{fontSize:40,marginBottom:10}}>{isGym?"💪":"🏄"}</div>
        <div style={{fontSize:18,fontWeight:700,marginBottom:4}}>{isGym?`Séance ${session} bouclée !`:"Surf enregistré !"}</div>
        <div style={{fontSize:14,color:"rgba(255,255,255,0.4)"}}>Repos aujourd'hui et demain — reprise J+2</div>
      </div>
    );
  }
  if(status==="rest"){
    return(
      <div style={{background:"rgba(251,191,36,0.07)",borderRadius:16,padding:"20px",border:"1px solid rgba(251,191,36,0.2)",marginBottom:16}}>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:12}}>
          <div style={{fontSize:32}}>😴</div>
          <div>
            <div style={{fontSize:16,fontWeight:700,color:"#fbbf24"}}>Repos</div>
            <div style={{fontSize:13,color:"rgba(255,255,255,0.45)",marginTop:2}}>{reason}</div>
          </div>
        </div>
        <div style={{fontSize:13,color:"rgba(255,255,255,0.35)",background:"rgba(255,255,255,0.04)",borderRadius:10,padding:"10px 14px"}}>
          ⏭ Prochaine séance : <span style={{color:"#fbbf24",fontWeight:700}}>Séance {nextSess} — {s.subtitle}</span>
        </div>
      </div>
    );
  }
  if(status==="warning"){
    return(
      <div style={{background:"rgba(239,68,68,0.07)",borderRadius:16,padding:"20px",border:"1px solid rgba(239,68,68,0.25)",marginBottom:16}}>
        <div style={{fontSize:14,color:"#f87171",fontWeight:600,marginBottom:12}}>⚠️ {reason} — C'est le moment de bouger !</div>
        <div style={{display:"flex",gap:10}}>
          <button onClick={()=>onStartGym(nextSess)} style={{...btn(s.color),flex:2,justifyContent:"center",padding:"12px"}}>💪 Séance {nextSess}</button>
          <button onClick={onSurf} style={{...btn("rgba(34,211,238,0.18)",{border:"1px solid rgba(34,211,238,0.35)"}),flex:1,justifyContent:"center",padding:"12px"}}>🏄 Surf</button>
        </div>
      </div>
    );
  }
  return(
    <div style={{background:`${s.color}10`,borderRadius:16,padding:"20px",border:`1px solid ${s.color}30`,marginBottom:16}}>
      <div style={{fontSize:11,color:s.color,fontWeight:700,letterSpacing:2,marginBottom:8}}>PROCHAINE SÉANCE</div>
      <div style={{fontSize:22,fontWeight:800,marginBottom:3}}>{s.label}</div>
      <div style={{fontSize:14,color:"rgba(255,255,255,0.5)",marginBottom:18}}>{s.subtitle} · {s.exercises.length} exercices</div>
      <div style={{display:"flex",gap:10}}>
        <button onClick={()=>onStartGym(nextSess)} style={{...btn(s.color),flex:2,justifyContent:"center",padding:"13px",fontSize:15}}><Ic.play/> Commencer</button>
        <button onClick={onSurf} style={{...btn("rgba(34,211,238,0.15)",{border:"1px solid rgba(34,211,238,0.3)"}),flex:1,justifyContent:"center",padding:"13px"}}>🏄 J'ai surfé</button>
      </div>
    </div>
  );
}

        </button>
        <button onClick={onHistory} style={{width:"100%",background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:14,padding:"13px 16px",cursor:"pointer",textAlign:"left",display:"flex",alignItems:"center",gap:14,marginTop:2}}>
          <div style={{width:40,height:40,borderRadius:10,background:"rgba(255,255,255,0.06)",display:"flex",alignItems:"center",justifyContent:"center"}}><Ic.history/></div>
          <div style={{flex:1}}>
            <div style={{fontSize:15,fontWeight:600,color:"rgba(255,255,255,0.7)"}}>Historique</div>
            <div style={{fontSize:12,color:"rgba(255,255,255,0.3)",marginTop:1}}>{(data.history||[]).length} activité{(data.history||[]).length!==1?"s":""}</div>
          </div>
        </button>
      </div>
    </div>
  );
}

// ─── ONBOARDING ───────────────────────────────────────────────────────────────
function Onboarding({onDone}){
  const[lastSession,setLastSession]=useState(null);
  const confirm=()=>{
    if(!lastSession)return;
    const twoDaysAgo=localDateStr(new Date(Date.now()-2*86400000));
    onDone({
      log:[{date:twoDaysAgo,type:"gym",session:lastSession}],
      history:[{date:twoDaysAgo,type:"gym",session:lastSession,label:PROGRAM[lastSession].label,
        exercises:PROGRAM[lastSession].exercises.map(e=>({name:e.name,sets:e.sets,reps:e.reps,load:e.load}))}],
    });
  };
  return(
    <div style={{minHeight:"100vh",background:"#0a0f1e",color:"#fff",fontFamily:"'Outfit',sans-serif",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"32px 24px"}}>
      <div style={{fontSize:40,marginBottom:20}}>🏄</div>
      <div style={{fontSize:24,fontWeight:800,marginBottom:8,textAlign:"center"}}>Bienvenue !</div>
      <div style={{fontSize:15,color:"rgba(255,255,255,0.5)",textAlign:"center",marginBottom:36,lineHeight:1.6}}>
        Pour calibrer ta rotation A→B→C,<br/>quelle était ta dernière séance ?
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:12,width:"100%",maxWidth:320}}>
        {Object.entries(PROGRAM).map(([key,s])=>(
          <button key={key} onClick={()=>setLastSession(key)} style={{padding:"16px 20px",borderRadius:14,border:`2px solid ${lastSession===key?s.color:"rgba(255,255,255,0.1)"}`,background:lastSession===key?`${s.color}18`:"rgba(255,255,255,0.04)",color:"#fff",cursor:"pointer",textAlign:"left",display:"flex",alignItems:"center",gap:14}}>
            <div style={{fontSize:22}}>{key==="A"?"🔵":key==="B"?"🟢":"🟠"}</div>
            <div>
              <div style={{fontSize:16,fontWeight:700,color:lastSession===key?s.color:"#fff"}}>{s.label}</div>
              <div style={{fontSize:13,color:"rgba(255,255,255,0.4)",marginTop:2}}>{s.subtitle}</div>
            </div>
            {lastSession===key&&<div style={{marginLeft:"auto",fontSize:18}}>✓</div>}
          </button>
        ))}
        <button onClick={()=>onDone({log:[],history:[]})} style={{padding:"13px",borderRadius:14,border:"1px solid rgba(255,255,255,0.1)",background:"none",color:"rgba(255,255,255,0.4)",cursor:"pointer",fontSize:14,marginTop:4}}>
          C'est mon premier entraînement
        </button>
      </div>
      {lastSession&&(
        <button onClick={confirm} style={{marginTop:28,padding:"14px 40px",background:PROGRAM[lastSession].color,border:"none",borderRadius:14,color:"#fff",fontSize:16,fontWeight:700,cursor:"pointer"}}>
          Confirmer → Séance {SESSION_ORDER[(SESSION_ORDER.indexOf(lastSession)+1)%3]} sera la prochaine
        </button>
      )}
    </div>
  );
}

// ─── APP ──────────────────────────────────────────────────────────────────────
function App(){
  const[data,setData]=useState(loadData);
  const[screen,setScreen]=useState("home");
  const[activeSession,setActive]=useState(null);

  useEffect(()=>{ saveData(data); },[data]);
  const update = d => setData(d);

  const handleUpdateDate = (historyIndex, newDate) => {
    setData(d => {
      const newHistory = [...(d.history||[])];
      const oldDate = newHistory[historyIndex].date;
      newHistory[historyIndex] = {...newHistory[historyIndex], date: newDate};
      let newLog = [...(d.log||[])];
      const entry = newHistory[historyIndex];
      const logIdx = newLog.findIndex(e => e.date === oldDate && e.type === entry.type);
      if (logIdx !== -1) newLog[logIdx] = {...newLog[logIdx], date: newDate};
      return {...d, history: newHistory, log: newLog};
    });
  };

  if(!data.initialized){
    return <Onboarding onDone={(init)=>{
      setData({overrides:{},history:init.history||[],log:init.log||[],initialized:true});
    }}/>;
  }

  if(screen==="history") return <HistoryView
    history={data.history||[]}
    onBack={()=>setScreen("home")}
    onReview={key=>{setActive(key);setScreen("review");}}
    onExport={()=>exportData(data)}
    onImport={(file)=>importData(file,d=>{setData(d);setScreen("home");},()=>alert("Fichier invalide"))}
    onClear={()=>{if(confirm("Effacer tout l'historique ?"))setData(d=>({...d,history:[],log:[]}));}}
    onUpdateDate={handleUpdateDate}/>;

  if(screen==="review"&&activeSession) return <SessionPreview sessionKey={activeSession} data={data}
    onUpdate={update} onStart={null} onBack={()=>setScreen("history")} readOnly={false}/>;

  if(screen==="preview"&&activeSession) return <SessionPreview sessionKey={activeSession} data={data}
    onUpdate={update} onStart={()=>setScreen("session")} onBack={()=>setScreen("home")} readOnly={false}/>;

  if(screen==="session"&&activeSession) return <SessionView sessionKey={activeSession} data={data}
    onUpdate={update} onBack={()=>setScreen("home")}/>;

  return <Home data={data} onUpdate={update}
    onStartGym={k=>{setActive(k);setScreen("preview");}}
    onHistory={()=>setScreen("history")}/>;
}


ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }
  </script>
</body>
